<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Geist:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313; /* Obsidian base */
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed-variant": "#7c2e00",
                      "on-surface": "#e4e2e1",
                      "on-background": "#e4e2e1",
                      "secondary-container": "#454747",
                      "error": "#ffb4ab",
                      "inverse-primary": "#005bc1",
                      "surface-bright": "#393939",
                      "primary-fixed-dim": "#adc6ff",
                      "surface-variant": "#353535",
                      "tertiary-fixed": "#ffdbcc",
                      "on-primary": "#002e69",
                      "surface-container-high": "#2a2a2a",
                      "secondary-fixed-dim": "#c6c6c7",
                      "on-error-container": "#ffdad6",
                      "on-primary-fixed": "#001a41",
                      "surface-container-lowest": "#0e0e0e",
                      "surface-container-highest": "#353535",
                      "on-error": "#690005",
                      "outline-variant": "#414755",
                      "primary-fixed": "#d8e2ff",
                      "surface-container-low": "#1b1c1c",
                      "error-container": "#93000a",
                      "surface-container": "#1f2020",
                      "on-secondary-container": "#b4b5b5",
                      "secondary": "#c6c6c7",
                      "tertiary": "#ffb595",
                      "on-tertiary-fixed": "#351000",
                      "on-tertiary": "#571e00",
                      "on-tertiary-container": "#4c1a00",
                      "on-primary-fixed-variant": "#004493",
                      "tertiary-container": "#ef6719",
                      "on-secondary": "#2f3131",
                      "background": "#131313",
                      "primary": "#adc6ff",
                      "on-surface-variant": "#c1c6d7",
                      "on-secondary-fixed-variant": "#454747",
                      "primary-container": "#4b8eff",
                      "tertiary-fixed-dim": "#ffb595",
                      "inverse-surface": "#e4e2e1",
                      "on-primary-container": "#00285c",
                      "outline": "#8b90a0",
                      "on-secondary-fixed": "#1a1c1c",
                      "surface-tint": "#adc6ff",
                      "surface-dim": "#131313",
                      "inverse-on-surface": "#303030",
                      "secondary-fixed": "#e2e2e2",
                      "surface": "#131313"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "container-max": "1100px",
                      "unit": "4px",
                      "margin-safe": "40px",
                      "gutter": "24px"
              },
              "fontFamily": {
                      "display-lg": ["Geist"],
                      "code-sm": ["JetBrains Mono"],
                      "ui-label": ["Geist"],
                      "typing-buffer": ["JetBrains Mono"],
                      "body-base": ["JetBrains Mono"],
                      "headline-md": ["Geist"],
                      "typing-buffer-mobile": ["JetBrains Mono"]
              },
              "fontSize": {
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "code-sm": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                      "ui-label": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "typing-buffer": ["32px", {"lineHeight": "48px", "letterSpacing": "0em", "fontWeight": "400"}],
                      "body-base": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "typing-buffer-mobile": ["20px", {"lineHeight": "30px", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-background text-on-surface flex flex-col min-h-screen">
<!-- TopNavBar -->
<nav class="bg-background dark:bg-background border-b border-outline-variant/30 flex justify-between items-center w-full px-margin-safe h-16 max-w-container-max mx-auto top-0 z-50">
<div class="font-display-lg text-headline-md font-bold tracking-tighter text-on-surface dark:text-on-surface">
            dificult
        </div>
<!-- Desktop Navigation -->
<div class="hidden md:flex gap-gutter items-center">
<a class="text-on-surface-variant font-ui-label hover:text-on-surface transition-colors duration-200" href="#">Test</a>
<a class="text-on-surface-variant font-ui-label hover:text-on-surface transition-colors duration-200" href="#">Leaderboard</a>
<a class="text-on-surface-variant font-ui-label hover:text-on-surface transition-colors duration-200" href="#">Store</a>
<a class="text-on-surface-variant font-ui-label hover:text-on-surface transition-colors duration-200" href="#">Tournaments</a>
<a class="text-on-surface-variant font-ui-label hover:text-on-surface transition-colors duration-200" href="#">Gear</a>
</div>
<div class="flex items-center gap-4">
<div class="flex gap-2 text-on-surface-variant">
<button class="material-symbols-outlined p-2 hover:bg-surface-variant/20 hover:text-primary transition-all duration-200" data-icon="palette">palette</button>
<button class="material-symbols-outlined p-2 hover:bg-surface-variant/20 hover:text-primary transition-all duration-200" data-icon="volume_up">volume_up</button>
<button class="material-symbols-outlined p-2 hover:bg-surface-variant/20 hover:text-primary transition-all duration-200" data-icon="settings">settings</button>
</div>
<button class="px-4 py-2 text-primary border-b-2 border-primary pb-1 font-bold text-ui-label font-ui-label active:scale-95 active:opacity-80 transition-all duration-150">Sign In</button>
</div>
</nav>
<!-- Main Content Focus Zone -->
<main class="flex-grow flex items-center justify-center px-4 py-16">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Header Section -->
<div class="text-center mb-10">
<h1 class="font-headline-md text-display-lg mb-2 text-on-surface">Welcome back</h1>
<p class="font-body-base text-body-base text-on-surface-variant opacity-70">Sign in to save stats, access the leaderboard, and track progress.</p>
</div>
<!-- Login Card / HUD Container -->
<div class="w-full space-y-6">
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 border border-outline-variant/30 bg-surface-container-lowest hover:bg-surface-variant/20 transition-all duration-200 group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12 5.04c1.94 0 3.51.68 4.75 1.83l3.51-3.51C17.91 1.26 15.21 0 12 0 7.31 0 3.25 2.67 1.19 6.6l4.12 3.2c1.01-2.99 3.8-5.17 6.69-5.17z" fill="#EA4335"></path>
<path d="M23.49 12.27c0-.83-.07-1.63-.2-2.39H12v4.51h6.47c-.28 1.48-1.12 2.74-2.38 3.58l3.71 2.87c2.16-2 3.69-4.94 3.69-8.57z" fill="#4285F4"></path>
<path d="M5.31 14.2c-.25-.74-.4-1.53-.4-2.35s.15-1.61.4-2.35L1.19 6.6C.43 8.11 0 9.8 0 11.85s.43 3.74 1.19 5.25l4.12-3.2z" fill="#FBBC05"></path>
<path d="M12 24c3.24 0 5.95-1.07 7.94-2.91l-3.71-2.87c-1.13.75-2.58 1.2-4.23 1.2-2.89 0-5.68-2.18-6.69-5.17L1.19 17.4C3.25 21.33 7.31 24 12 24z" fill="#34A853"></path>
</svg>
<span class="font-ui-label text-ui-label text-on-surface">Continue with Google</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="flex-shrink mx-4 font-code-sm text-code-sm text-on-surface-variant/40">or</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-1">
<label class="block font-ui-label text-ui-label text-on-surface-variant uppercase tracking-widest opacity-60">Email</label>
<input class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary focus:ring-0 px-0 py-2 font-body-base text-body-base placeholder:text-outline-variant/50 transition-colors" placeholder="you@example.com" type="email"/>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="block font-ui-label text-ui-label text-on-surface-variant uppercase tracking-widest opacity-60">Password</label>
<a class="font-ui-label text-[10px] text-primary/60 hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary focus:ring-0 px-0 py-2 font-body-base text-body-base placeholder:text-outline-variant/50 transition-colors" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-on-surface text-background font-ui-label text-ui-label font-bold py-3 hover:bg-primary transition-all duration-200 active:scale-[0.98] mt-4" type="submit">
                        Log In
                    </button>
</form>
<!-- Footer Actions -->
<div class="flex flex-col items-center gap-4 mt-8">
<a class="font-ui-label text-ui-label text-on-surface-variant hover:text-primary transition-colors" href="#">Create account</a>
<a class="flex items-center gap-2 font-ui-label text-ui-label text-on-surface-variant/50 hover:text-on-surface transition-colors" href="#">
<span class="material-symbols-outlined text-[14px]">arrow_back</span>
                        Back to typing
                    </a>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface-container-lowest dark:bg-surface-container-lowest border-t border-outline-variant/10 w-full">
<div class="flex flex-col md:flex-row justify-between items-center w-full py-8 px-margin-safe max-w-container-max mx-auto gap-gutter">
<div class="flex flex-col items-center md:items-start gap-1">
<span class="font-display-lg text-body-base font-bold text-on-surface-variant">dificult</span>
<p class="font-body-base text-code-sm text-on-surface-variant/60">© 2024 dificult. Crafted for the flow state.</p>
</div>
<div class="flex gap-6 items-center">
<a class="text-on-surface-variant font-ui-label hover:text-primary transition-colors duration-200 focus:ring-1 focus:ring-primary px-1" href="#">GitHub</a>
<a class="text-on-surface-variant font-ui-label hover:text-primary transition-colors duration-200 focus:ring-1 focus:ring-primary px-1" href="#">Discord</a>
<a class="text-on-surface-variant font-ui-label hover:text-primary transition-colors duration-200 focus:ring-1 focus:ring-primary px-1" href="#">Privacy</a>
<a class="text-on-surface-variant font-ui-label hover:text-primary transition-colors duration-200 focus:ring-1 focus:ring-primary px-1" href="#">Terms</a>
<a class="text-on-surface-variant font-ui-label hover:text-primary transition-colors duration-200 focus:ring-1 focus:ring-primary px-1" href="#">Status</a>
</div>
</div>
</footer>
<!-- Background visual flair -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-tertiary/5 blur-[100px] rounded-full"></div>
</div>
</body></html>
